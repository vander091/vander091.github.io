<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work With Me | Van</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
              url('./background.jpg') no-repeat center center/cover;
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-6">

<div class="bg-black/60 backdrop-blur-lg p-8 rounded-2xl w-full max-w-xl border border-gray-800">

  <h1 class="text-3xl font-bold mb-6 text-center">Work With Me</h1>

  <form action="https://formsubmit.co/arcenasv@gmail.com" method="POST" class="space-y-4">

    <!-- ✅ CORRECT URL (fixed username) -->
    <input type="hidden" name="_next" value="https://vander091.github.io/thankyou.html">
    <input type="hidden" name="_redirect" value="https://vander091.github.io/thankyou.html">

    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="New Client Inquiry from Portfolio">
    <input type="hidden" name="_template" value="table">

    <!-- Inputs -->
    <input type="text" name="name" required placeholder="Your Name"
      class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:outline-none">

    <input type="email" name="email" required placeholder="Your Email"
      class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:outline-none">

    <textarea name="message" required placeholder="Message" rows="5"
      class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:outline-none"></textarea>

    <button type="submit"
      class="w-full bg-blue-500 py-3 rounded-xl hover:bg-blue-600 transition">
      Send Message
    </button>

  </form>

  <!-- Back -->
  <div class="text-center mt-6">
    <a href="index.html" class="text-gray-400 hover:text-white text-sm">← Back to Home</a>
  </div>

</div>

</body>
</html>
